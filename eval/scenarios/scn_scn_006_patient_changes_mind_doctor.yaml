id: SCN-006
name: Patient Changes Mind (Doctor)
category: correction
description: Patient asks for Ramesh B., then changes to Girish B. Navasundi before
  booking.
caller_profile:
  name: Change Doctor Guy
  phone: '+915555555555'
conversation_script:
- turn: 1
  speaker: patient
  utterance: I want to see Ramesh B. tomorrow.
- turn: 2
  speaker: agent
  expected_tool_calls:
  - check_availability
  expected_tool_params:
    doctor_name: Dr. Ramesh B.
- turn: 3
  speaker: patient
  utterance: Actually, make it Dr. Girish B. Navasundi.
- turn: 4
  speaker: agent
  expected_tool_calls:
  - check_availability
  expected_tool_params:
    doctor_name: Dr. Girish B. Navasundi
- turn: 5
  speaker: patient
  utterance: Book it.
- turn: 6
  speaker: agent
  expected_tool_calls:
  - book_appointment
  expected_tool_params:
    doctor_name: Dr. Girish B. Navasundi
expected_db_state:
  appointments:
  - patient_name: Change Doctor Guy
    doctor_name: Dr. Girish B. Navasundi
expected_outcome: booked
