id: SCN-003
name: Slot Conflict
category: conflict
description: Double booking the same slot; second must fail with SLOT_UNAVAILABLE.
caller_profile:
  name: Double Booking Flow
  phone: '+918888888888'
conversation_script:
- turn: 1
  speaker: patient
  utterance: Book Ramesh B tomorrow morning.
- turn: 2
  speaker: agent
  expected_tool_calls:
  - check_availability
  expected_tool_params:
    doctor_name: Dr. Ramesh B.
- turn: 3
  speaker: patient
  utterance: Book the first slot.
- turn: 4
  speaker: agent
  expected_tool_calls:
  - book_appointment
  expected_tool_params:
    doctor_name: Dr. Ramesh B.
- turn: 5
  speaker: patient
  utterance: Try to book that exact slot again for someone else.
- turn: 6
  speaker: agent
  expected_tool_calls:
  - book_appointment
  expected_tool_params:
    force_duplicate: true
expected_db_state:
  appointments_count: 1
expected_outcome: concurrency_failed
