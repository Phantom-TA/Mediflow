id: SCN-016
name: Complete Full Flow
category: e2e
description: 'Full cycle: book, then reschedule, then cancel.'
caller_profile:
  name: Cycle Rider
  phone: '+919999999900'
conversation_script:
- turn: 1
  speaker: patient
  utterance: Book Ramesh B tomorrow.
- turn: 2
  speaker: agent
  expected_tool_calls:
