id: SCN-008
name: Multiple Corrections
category: correction
description: Changes from Cardio to Ortho, then changes doctor choice, then books.
caller_profile:
  name: Multiple Corrections Guy
  phone: '+913333333333'
conversation_script:
- turn: 1
  speaker: patient
  utterance: I want a heart doctor.
- turn: 2
  speaker: agent
  expected_tool_calls:
  - find_doctors
  expected_tool_params:
