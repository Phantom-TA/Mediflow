  utterance: Book Dr. Manish Samson.
- turn: 6
  speaker: agent
  expected_tool_calls:
  - check_availability
  expected_tool_params:
    doctor_name: Dr. Manish Samson
- turn: 7
  speaker: patient
  utterance: Book the first slot.
- turn: 8
  speaker: agent
  expected_tool_calls:
  - book_appointment
  expected_tool_params:
    doctor_name: Dr. Manish Samson
expected_db_state:
  appointments:
  - patient_name: Multiple Corrections Guy
    doctor_name: Dr. Manish Samson
