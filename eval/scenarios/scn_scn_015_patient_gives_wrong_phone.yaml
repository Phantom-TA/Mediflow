id: SCN-015
name: Patient Gives Wrong Phone
category: error_recovery
description: Patient books but gives invalid phone format, agent validates.
caller_profile:
  name: Bad Phone Guy
  phone: '9876'
conversation_script:
- turn: 1
  speaker: patient
  utterance: Book Ramesh B tomorrow morning.
- turn: 2
  speaker: agent
  expected_tool_calls:
