version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: mediflow_db
    restart: always
    environment:
      POSTGRES_DB: mediflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mediflow"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediflow_app
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mediflow
      APP_ENV: development
      VAPI_SECRET: local-dev-secret
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  migrator_and_seeder:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mediflow_setup
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/mediflow
      APP_ENV: development
    # Runs migrations, seeds database, and pre-generates appointment slots
    command: >
      sh -c "alembic upgrade head && 
             python ../scripts/seed_database.py && 
             python ../scripts/generate_slots.py"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
