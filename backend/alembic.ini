# Alembic configuration file
# This file is read by the `alembic` tool.

[alembic]
# Path to migration scripts
script_location = alembic

# Template used to generate migration files
file_template = %%(year)d%%(month)02d%%(day)02d_%%(hour)02d%%(minute)02d%%(second)02d_%%(slug)s

# Timezone to use when rendering the date within the migration file.
timezone = UTC

# Max length of characters to apply to the "slug" field
truncate_slug_length = 40

# Version table name (default: alembic_version)
version_table = alembic_version

# Prepend the SQLAlchemy URL to the begin_transaction block? 
prepend_sys_path = .

# sys.path is always used even with prepend_sys_path disabled
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
